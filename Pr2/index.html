<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <section>
        <h2>Калькулятор валового викиду палива</h2>
        <form method="post">
            <div id="selection" class="input_output">
                <div class="input_value">
                    <label for="fuel_list" class="left">Виберіть тип палива</label>
                    <select id="fuel_list" name="fuel_list" required class="values">
                        <option value="user" {{if eq .InputType "user"}}selected{{end}}>Користувацький ввід</option>
                        <option value="coal" {{if eq .InputType "coal"}}selected{{end}}>Донецьке газове вугілля марки ГР</option>
                        <option value="mazut" {{if eq .InputType "mazut"}}selected{{end}}>Високосірчистий мазут марки 40</option>
                        <option value="gas" {{if eq .InputType "gas"}}selected{{end}}>Природний газ із газопроводу Уренгой-Ужгород</option>
                    </select>
                </div>
            </div>
            <div id="user_input" class="input_output">
                <div class="input_value">
                    <label for="low_burn_temp" class="left"><abbr title="Нижча робочу теплоту згоряння">Q<sup>r</sup><sub>i</sub></abbr></label>
                    <input id="low_burn_temp" name="low_burn_temp" type="number" step="0.01" required class="values" value="{{.LowBurnTemp}}">
                    <label for="low_burn_temp" class="right">МДж/кг</label>
                </div>
                <div class="input_value">
                    <label for="ash_part" class="left"><abbr title="Частка золи, яка виходить з котла у вигляді леткої золи">a<sub>вин</sub></abbr></label>
                    <input id="ash_part" name="ash_part" type="number" step="0.01" required class="values" value="{{.AshPart}}">
                    <label for="ash_part" class="right"></label>
                </div>
                <div class="input_value">
                    <label for="ash_mass" class="left"><abbr title="Масовий вміст золи в паливі на робочу масу">A<sup>r</sup></abbr></label>
                    <input id="ash_mass" name="ash_mass" type="number" step="0.01" required class="values" value="{{.AshMass}}">
                    <label for="ash_mass" class="right">%</label>
                </div>
                <div class="input_value">
                    <label for="burnable_ejection" class="left"><abbr title="Масовий вміст горючих речовин у викидах твердих частинок">Г<sub>вин</sub></abbr></label>
                    <input id="burnable_ejection" name="burnable_ejection" type="number" step="0.01" required class="values" value="{{.BurnableEjection}}">
                    <label for="burnable_ejection" class="right">%</label>
                </div>
                <div class="input_value">
                    <label for="cleaning_efficiency" class="left"><abbr title="Ефективність очищення димових газів від твердих частинок">&eta;<sub>зу</sub></abbr></label>
                    <input id="cleaning_efficiency" name="cleaning_efficiency" type="number" step="0.01" class="values" required value="{{.CleaningEfficiency}}">
                    <label for="cleaning_efficiency" class="right"></label>
                </div>
                <div class="input_value">
                    <label for="solid_emission_with_sulfur" class="left"><abbr title="Показник емісії твердих продуктів взаємодії сорбенту та оксидів сірки і твердих
                            частинок сорбенту">k<sub>твS</sub></abbr></label>
                    <input id="solid_emission_with_sulfur" name="solid_emission_with_sulfur" type="number" step="0.01" required class="values" value="{{.SolidEmissionWithSulfur}}">
                    <label for="solid_emission_with_sulfur" class="right">г/ГДж</label>
                </div>
            </div>
            <div class="input_output">
                <div class="input_value">
                    <label for="mass" class="left">Маса палива</label>
                    <input id="mass" name="mass" type="number" step="0.01" required class="values" value="{{.Mass}}">
                    <label for="mass" class="right">т</label>
                </div>
            </div>
            <button id="calculate" type="submit">Розраxувати</button>
        </form>
        <div id="results" class="input_output">
            <div class="input_value">
                <label for="emission" class="left"><abbr title="Показник емісії твердих частинок">k<sub>тв</sub></abbr></label>
                <p id="emission" class="values">{{printf "%.2f" (index .Result "emission")}}</p>
                <label for="emission" class="right">г/ГДж</label>
            </div>
            <div class="input_value">
                <label for="ejection" class="left"><abbr title="Валовий викид">E<sub>тв</sub></abbr></label>
                <p id="ejection" class="values">{{printf "%.2f" (index .Result "ejection")}}</p>
                <label for="ejection" class="right">т</label>
            </div>
        </div>
    </section>

    <script src="static/script.js"></script>
</body>
</html>
